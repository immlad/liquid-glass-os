<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Liquid Glass OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ Tailwind CDN (your OS now works) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ Custom liquid‑glass styles -->
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.28);
      --glass-border: rgba(255, 255, 255, 0.45);
      --glass-shadow: rgba(0, 0, 0, 0.12);
      --glass-blur: 22px;
      --glass-radius: 18px;
      --glass-text: #111;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--glass-radius);
      box-shadow: 0 8px 28px var(--glass-shadow);
      color: var(--glass-text);
    }

    /* OS layout fixes */
    .os-shell { position: fixed; inset: 0; overflow: hidden; }
    .desktop { position: absolute; inset: 0; }
    .desktop-icons {
      position: absolute;
      top: 80px;
      left: 40px;
      display: grid;
      grid-template-columns: repeat(4, 90px);
      gap: 22px;
    }
    .window {
      position: absolute;
      width: 640px;
      height: 440px;
      overflow: hidden;
      z-index: 20;
    }
    .window-header {
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--glass-border);
    }
    .window-iframe { width: 100%; height: 100%; border: none; }
    .dock {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      z-index: 60;
    }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 38px;
      z-index: 50;
    }
  </style>
</head>

<body class="overflow-hidden bg-gradient-to-b from-white to-slate-200">

  <!-- BOOT SCREEN -->
  <div id="boot-screen" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-50">
    <div class="text-4xl mb-2">⌘</div>
    <div class="text-gray-600">Liquid Glass OS</div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="hidden fixed inset-0 flex items-center justify-center">
    <div class="glass p-6 w-72">
      <div class="text-xl font-semibold mb-3">Welcome</div>
      <input id="login-name" class="w-full mb-3 p-2 rounded border" placeholder="Enter your name">
      <button id="login-button" class="w-full p-2 rounded bg-white border">Sign In</button>

      <div class="mt-4 mb-2 font-medium">Profiles</div>
      <div id="profile-list" class="max-h-40 overflow-auto space-y-2"></div>
    </div>
  </div>

  <!-- OS SHELL -->
  <div id="os-shell" class="os-shell hidden">

    <!-- TOPBAR -->
    <div class="topbar glass flex items-center justify-between px-4">
      <div class="flex items-center gap-2">
        <span class="text-lg">⌘</span>
        <span class="font-semibold">Liquid Glass OS</span>
      </div>

      <button id="btn-switch-user" class="px-3 py-1 rounded hover:bg-white/40">◉ Switch User</button>

      <div class="flex items-center gap-3">
        <span id="topbar-user">Guest</span>
        <span id="topbar-clock"></span>
        <button id="btn-notifications" class="relative">•
          <span id="notif-badge" class="hidden absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
      </div>
    </div>

    <!-- DESKTOP -->
    <div id="desktop" class="desktop">
      <div class="desktop-icons">
        <div class="text-center cursor-pointer" data-app="browser">
          <div class="glass w-14 h-14 flex items-center justify-center text-2xl rounded-xl">⌘</div>
          <span class="text-sm">Browser</span>
        </div>

        <div class="text-center cursor-pointer" data-app="movies">
          <div class="glass w-14 h-14 flex items-center justify-center text-2xl rounded-xl">▶︎</div>
          <span class="text-sm">Movies</span>
        </div>

        <div class="text-center cursor-pointer" data-app="settings">
          <div class="glass w-14 h-14 flex items-center justify-center text-2xl rounded-xl">⚙</div>
          <span class="text-sm">Settings</span>
        </div>

        <div class="text-center cursor-pointer" data-app="chatcord">
          <div class="glass w-14 h-14 flex items-center justify-center text-2xl rounded-xl">✉</div>
          <span class="text-sm">Chat</span>
        </div>

        <div class="text-center cursor-pointer" data-app="appstore">
          <div class="glass w-14 h-14 flex items-center justify-center text-2xl rounded-xl">⌂</div>
          <span class="text-sm">App Store</span>
        </div>
      </div>

      <div id="desktop-custom-apps" class="desktop-icons"></div>
    </div>

    <!-- DOCK -->
    <div class="dock glass rounded-2xl">
      <div class="flex items-center gap-4">
        <button class="dock-icon" data-app="browser"><div class="text-2xl">⌘</div></button>
        <button class="dock-icon" data-app="movies"><div class="text-2xl">▶︎</div></button>
        <button class="dock-icon" data-app="settings"><div class="text-2xl">⚙</div></button>
        <button class="dock-icon" data-app="chatcord"><div class="text-2xl">✉</div></button>
        <button id="btn-appstore"><div class="text-2xl">⌂</div></button>
      </div>
    </div>

    <!-- WINDOWS -->
    <div id="window-browser" class="window glass hidden" style="left:120px;top:120px;">
      <div class="window-header" data-drag-handle>
        <div class="flex gap-2 mr-2">
          <span class="dot w-3 h-3 rounded-full bg-red-500" data-role="close"></span>
          <span class="dot w-3 h-3 rounded-full bg-yellow-400" data-role="minimize"></span>
          <span class="dot w-3 h-3 rounded-full bg-green-500" data-role="fullscreen"></span>
        </div>
        <div>Browser</div>
      </div>
      <div class="window-body">
        <div class="p-2 flex gap-2 border-b">
          <input id="browser-url" class="flex-1 p-1 rounded border" placeholder="Type a URL">
          <button id="browser-go" class="px-3 py-1 rounded border bg-white">Go</button>
        </div>
        <iframe id="browser-frame" class="window-iframe"></iframe>
      </div>
    </div>

    <div id="window-chatcord" class="window glass hidden" style="left:240px;top:240px;">
      <div class="window-header" data-drag-handle>
        <div class="flex gap-2 mr-2">
          <span class="dot w-3 h-3 rounded-full bg-red-500" data-role="close"></span>
          <span class="dot w-3 h-3 rounded-full bg-yellow-400" data-role="minimize"></span>
          <span class="dot w-3 h-3 rounded-full bg-green-500" data-role="fullscreen"></span>
        </div>
        <div>Liquid Glass Chat</div>
      </div>
      <iframe id="chatcord-frame" class="window-iframe"></iframe>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
