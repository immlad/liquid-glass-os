<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Liquid Glass OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Liquid Glass + macOS styles -->
  <link rel="stylesheet" href="tailwind.css" />
</head>
<body class="overflow-hidden bg-[radial-gradient(circle_at_top,_#ffffff_0,_#e0f2fe_30%,_#e0e7ff_60%,_#f5d0fe_100%)]">

  <!-- BOOT SCREEN -->
  <div id="boot-screen" class="boot-screen">
    <div class="text-4xl mb-2">⌘</div>
    <div class="text-slate-600 text-sm tracking-wide">Liquid Glass OS</div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="hidden fixed inset-0 flex items-center justify-center">
    <div class="glass login-panel">
      <div class="text-lg font-semibold mb-3">Welcome</div>
      <input id="login-name" class="w-full mb-3 p-2 rounded border border-white/60 bg-white/70 text-sm" placeholder="Enter your name" />
      <button id="login-button" class="w-full p-2 rounded bg-white/85 border border-white/70 text-sm hover:bg-white">
        Enter Liquid Glass
      </button>
    </div>
  </div>

  <!-- OS SHELL -->
  <div id="os-shell" class="os-shell hidden">

    <!-- TOPBAR -->
    <div class="topbar glass-strong flex items-center justify-between px-4">
      <div class="flex items-center gap-2">
        <span class="text-lg">⌘</span>
        <span class="font-semibold text-sm">Liquid Glass OS</span>
      </div>
      <div class="flex items-center gap-4 text-xs">
        <span id="topbar-user" class="font-medium">Guest</span>
        <span id="topbar-clock" class="opacity-80"></span>
        <button id="btn-notifications" class="relative">
          ⦿
          <span id="notif-badge" class="notif-badge hidden"></span>
        </button>
      </div>
    </div>

    <!-- DESKTOP -->
    <div id="desktop" class="desktop">
      <div class="desktop-icons">
        <div class="flex flex-col items-center gap-1 cursor-pointer" data-app="browser">
          <div class="icon-glass">⌘</div>
          <span class="text-[11px] mt-1">Browser</span>
        </div>
        <div class="flex flex-col items-center gap-1 cursor-pointer" data-app="chat">
          <div class="icon-glass">✉</div>
          <span class="text-[11px] mt-1">Chat</span>
        </div>
        <div class="flex flex-col items-center gap-1 cursor-pointer" data-app="settings">
          <div class="icon-glass">⚙</div>
          <span class="text-[11px] mt-1">Settings</span>
        </div>
        <div class="flex flex-col items-center gap-1 cursor-pointer" data-app="notifications">
          <div class="icon-glass">🔔</div>
          <span class="text-[11px] mt-1">Notifications</span>
        </div>
      </div>
    </div>

    <!-- DOCK -->
    <div class="dock glass-strong flex items-center gap-4">
      <button class="dock-icon" data-app="browser">⌘</button>
      <button class="dock-icon" data-app="chat">✉</button>
      <button class="dock-icon" data-app="settings">⚙</button>
      <button class="dock-icon" data-app="notifications">🔔</button>
    </div>

    <!-- WINDOWS -->

    <!-- Browser -->
    <div id="window-browser" class="window glass hidden" style="left:120px;top:120px;">
      <div class="window-header" data-drag-handle>
        <div class="window-controls">
          <span class="dot" data-role="close"></span>
          <span class="dot" data-role="minimize"></span>
          <span class="dot" data-role="fullscreen"></span>
        </div>
        <div class="text-xs font-medium">Liquid Browser</div>
      </div>
      <div class="window-body flex flex-col">
        <div class="p-2 flex gap-2 border-b border-white/40">
          <input id="browser-url" class="flex-1 p-1 rounded border border-white/60 bg-white/75 text-xs" placeholder="Type a URL" />
          <button id="browser-go" class="px-3 py-1 rounded border bg-white/85 text-xs">Go</button>
        </div>
        <iframe id="browser-frame" class="window-iframe"></iframe>
      </div>
    </div>

    <!-- Chat -->
    <div id="window-chat" class="window glass hidden" style="left:220px;top:160px;">
      <div class="window-header" data-drag-handle>
        <div class="window-controls">
          <span class="dot" data-role="close"></span>
          <span class="dot" data-role="minimize"></span>
          <span class="dot" data-role="fullscreen"></span>
        </div>
        <div class="text-xs font-medium">Liquid Glass Chat</div>
      </div>
      <div class="window-body">
        <iframe id="chat-frame" class="window-iframe"></iframe>
      </div>
    </div>

    <!-- Settings -->
    <div id="window-settings" class="window glass hidden" style="left:180px;top:200px;">
      <div class="window-header" data-drag-handle>
        <div class="window-controls">
          <span class="dot" data-role="close"></span>
          <span class="dot" data-role="minimize"></span>
          <span class="dot" data-role="fullscreen"></span>
        </div>
        <div class="text-xs font-medium">Settings</div>
      </div>
      <div class="window-body p-4 text-xs space-y-4 overflow-auto">
        <div>
          <div class="font-semibold mb-1">Profile</div>
          <div>Signed in as <span id="settings-user" class="font-medium">Guest</span></div>
        </div>
        <div>
          <div class="font-semibold mb-1">Theme</div>
          <div class="flex gap-2">
            <button class="px-3 py-1 rounded bg-white/85 border text-[11px]" data-theme="aurora">Aurora</button>
            <button class="px-3 py-1 rounded bg-white/50 border text-[11px]" data-theme="white">White</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Notifications -->
    <div id="window-notifications" class="window glass hidden" style="left:260px;top:140px;">
      <div class="window-header" data-drag-handle>
        <div class="window-controls">
          <span class="dot" data-role="close"></span>
          <span class="dot" data-role="minimize"></span>
          <span class="dot" data-role="fullscreen"></span>
        </div>
        <div class="text-xs font-medium">Notifications</div>
      </div>
      <div class="window-body p-3 text-xs overflow-auto">
        <ul id="notifications-list" class="space-y-2"></ul>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
